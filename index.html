<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Maison Dhikra · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--gold:#b8965a;--border:rgba(184,150,90,0.18);--white:#f5f2ec;--grey:#888;--red:#c0392b}
body{background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;font-weight:300;min-height:100vh}
.serif{font-family:'Cormorant Garamond',serif}

/* LOGIN */
#login{position:fixed;inset:0;background:var(--black);display:flex;align-items:center;justify-content:center;z-index:999;padding:24px}
#login.gone{display:none}
.login-box{width:100%;max-width:360px;text-align:center}
.login-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-style:italic;color:var(--gold);margin-bottom:8px}
.login-sub{font-size:9px;letter-spacing:0.4em;text-transform:uppercase;color:var(--grey);margin-bottom:40px}
.login-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--white);padding:14px;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:300;outline:none;margin-bottom:12px;text-align:center;letter-spacing:0.2em}
.btn{padding:12px 28px;border:none;cursor:pointer;font-size:10px;letter-spacing:0.3em;text-transform:uppercase;font-family:'Montserrat',sans-serif;font-weight:400;transition:opacity 0.2s;width:100%}
.btn-gold{background:var(--gold);color:var(--black)}
.btn-ghost{background:transparent;color:var(--gold);border:1px solid var(--border)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(192,57,43,0.3)}
.btn:disabled{opacity:0.4;cursor:not-allowed}

/* LAYOUT */
#app{display:none;max-width:860px;margin:0 auto;padding:40px 24px}
#app.show{display:block}

/* HEADER */
.admin-header{text-align:center;margin-bottom:52px}
.admin-eyebrow{font-size:9px;letter-spacing:0.5em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.admin-title{font-family:'Cormorant Garamond',serif;font-size:44px;font-style:italic;line-height:1;margin-bottom:16px}
.gold-line{height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);margin:16px auto;max-width:200px}
.admin-count{font-size:10px;color:var(--grey);letter-spacing:0.2em}

/* SEARCH + NEW */
.toolbar{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap}
.search{flex:1;min-width:180px;background:var(--surface2);border:1px solid var(--border);color:var(--white);padding:11px 14px;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:300;outline:none}
.search:focus{border-color:var(--gold)}

/* FAMILY LIST */
.family-card{background:var(--surface);border:1px solid var(--border);padding:20px 24px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:border-color 0.2s;margin-bottom:2px}
.family-card:hover{border-color:var(--gold)}
.family-info{flex:1;min-width:0}
.family-name-fr{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;margin-bottom:2px}
.family-name-ar{font-size:13px;color:var(--gold);margin-bottom:4px}
.family-meta{font-size:10px;color:var(--grey);letter-spacing:0.1em}
.family-actions{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.delete-btn{font-size:9px;color:var(--red);cursor:pointer;letter-spacing:0.2em;text-transform:uppercase;background:none;border:none;padding:4px}
.empty{text-align:center;padding:80px 24px;border:1px dashed var(--border)}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-style:italic;color:var(--grey);margin-bottom:20px}

/* FORM */
.form-box{background:var(--surface);border:1px solid var(--border);padding:28px;margin-bottom:2px}
.form-label{font-size:9px;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);margin-bottom:18px;display:block}
.field-label{font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}
.field{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--white);padding:11px 14px;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:300;outline:none;margin-bottom:14px}
.field:focus{border-color:var(--gold)}
textarea.field{resize:vertical}
.field-row{display:flex;gap:8px;margin-bottom:8px}
.field-row .field{margin-bottom:0;flex:1}
.remove-btn{background:none;border:1px solid var(--border);color:var(--red);padding:0 14px;cursor:pointer;font-size:18px;flex-shrink:0}
.add-btn{font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);background:none;border:1px solid var(--border);padding:8px 16px;cursor:pointer;margin-top:4px}
.form-actions{display:flex;gap:10px;margin-top:24px}
.form-actions .btn{width:auto}
.back-btn{font-size:9px;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);cursor:pointer;margin-bottom:24px;background:none;border:none;padding:0}

/* DETAIL */
.qr-box{background:var(--surface);border:1px solid var(--gold);padding:36px;text-align:center;margin-bottom:2px;position:relative}
.qr-corner{position:absolute;width:14px;height:14px;border-color:var(--gold);border-style:solid}
.qr-corner.tl{top:8px;left:8px;border-width:1px 0 0 1px}
.qr-corner.tr{top:8px;right:8px;border-width:1px 1px 0 0}
.qr-corner.bl{bottom:8px;left:8px;border-width:0 0 1px 1px}
.qr-corner.br{bottom:8px;right:8px;border-width:0 1px 1px 0}
.qr-eyebrow{font-size:9px;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
.qr-img{display:inline-block;padding:14px;background:#fff;margin-bottom:16px}
.qr-scan{font-family:'Cormorant Garamond',serif;font-size:12px;letter-spacing:0.4em;text-transform:uppercase;color:var(--grey);margin-bottom:24px}
.qr-url{font-size:10px;color:var(--grey);word-break:break-all;margin-bottom:20px;padding:10px;background:var(--surface2);border:1px solid var(--border)}
.btn-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.btn-row .btn{width:auto}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:2px}
.detail-card{background:var(--surface);border:1px solid var(--border);padding:20px}
.detail-card-label{font-size:9px;letter-spacing:0.4em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.detail-item{font-size:11px;color:var(--grey);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--black);padding:12px 28px;font-size:11px;letter-spacing:0.3em;text-transform:uppercase;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-title">Maison Dhikra</div>
    <div class="login-sub">Admin · لوحة التحكم</div>
    <input class="login-input" type="password" id="pwd" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')checkLogin()"/>
    <button class="btn btn-gold" onclick="checkLogin()">Entrer</button>
    <div style="font-size:10px;color:var(--red);margin-top:12px;min-height:16px" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- DASHBOARD -->
  <div id="view-dashboard">
    <div class="admin-header">
      <div class="admin-eyebrow">Admin · لوحة التحكم</div>
      <div class="admin-title serif">Maison Dhikra</div>
      <div class="gold-line"></div>
      <div class="admin-count" id="family-count">Chargement…</div>
    </div>
    <div class="toolbar">
      <input class="search" id="search-input" placeholder="Rechercher une famille…" oninput="renderList()"/>
      <button class="btn btn-gold" style="width:auto" onclick="showCreate()">+ Nouvelle famille</button>
    </div>
    <div id="family-list"></div>
  </div>

  <!-- CREATE -->
  <div id="view-create" style="display:none">
    <button class="back-btn" onclick="showDashboard()">← Retour</button>
    <div style="font-family:'Cormorant Garamond',serif;font-size:36px;font-style:italic;margin-bottom:32px">Nouvelle famille</div>

    <div class="form-box">
      <span class="form-label">Identité</span>
      <div class="field-label">Nom (Français) *</div>
      <input class="field" id="f-name-fr" placeholder="ex: La Famille Benali"/>
      <div class="field-label">الاسم بالعربية</div>
      <input class="field" id="f-name-ar" placeholder="ex: عائلة بنعلي"/>
      <div class="field-label">Message personnel</div>
      <textarea class="field" id="f-message" rows="3" placeholder="Un message qui apparaîtra sur leur page…"></textarea>
    </div>

    <div class="form-box">
      <span class="form-label">Vidéos (liens Vimeo ou YouTube)</span>
      <div id="video-inputs">
        <div class="field-row"><input class="field" placeholder="https://vimeo.com/…"/></div>
      </div>
      <button class="add-btn" onclick="addField('video-inputs','Lien vidéo')">+ Ajouter une vidéo</button>
    </div>

    <div class="form-box">
      <span class="form-label">Photos (liens directs)</span>
      <div id="photo-inputs">
        <div class="field-row"><input class="field" placeholder="https://… (lien direct vers image)"/></div>
      </div>
      <button class="add-btn" onclick="addField('photo-inputs','Lien photo')">+ Ajouter une photo</button>
    </div>

    <div class="form-actions">
      <button class="btn btn-ghost" onclick="showDashboard()">Annuler</button>
      <button class="btn btn-gold" id="save-btn" onclick="saveFamily()">Créer la page famille</button>
    </div>
  </div>

  <!-- DETAIL -->
  <div id="view-detail" style="display:none">
    <button class="back-btn" onclick="showDashboard()">← Toutes les familles</button>
    <div id="detail-content"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://tuwlmktixwqcttfjiej.supabase.co';
const SUPABASE_KEY = 'eyJhbGci0iJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1d2xta3RpeHdxY3R0ZmpqZWoiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0OTUwMDYyMiwiZXhwIjoyMDY1MDc2NjIyfQ.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR1d2xta3RpeHdxY3R0ZmpqZWoiLCJyb2xlIjoiYW5vbiJ9';
const ADMIN_PASSWORD = 'dhikra2025';
const BASE_URL = 'https://maison-dhikra.vercel.app';

let families = [];
let currentFamily = null;

// ── AUTH ──
function checkLogin() {
  const pwd = document.getElementById('pwd').value;
  if (pwd === ADMIN_PASSWORD) {
    document.getElementById('login').classList.add('gone');
    document.getElementById('app').classList.add('show');
    loadFamilies();
  } else {
    document.getElementById('login-err').textContent = 'Mot de passe incorrect';
  }
}

// ── API ──
async function api(method, path, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : '',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (method === 'DELETE') return;
  return res.json();
}

async function loadFamilies() {
  families = await api('GET', 'families?select=*&order=created_at.desc') || [];
  renderList();
  document.getElementById('family-count').textContent =
    `${families.length} famille${families.length !== 1 ? 's' : ''} enregistrée${families.length !== 1 ? 's' : ''}`;
}

// ── VIEWS ──
function showDashboard() {
  document.getElementById('view-dashboard').style.display = 'block';
  document.getElementById('view-create').style.display = 'none';
  document.getElementById('view-detail').style.display = 'none';
  loadFamilies();
}

function showCreate() {
  document.getElementById('view-dashboard').style.display = 'none';
  document.getElementById('view-create').style.display = 'block';
  document.getElementById('view-detail').style.display = 'none';
}

function showDetail(family) {
  currentFamily = family;
  document.getElementById('view-dashboard').style.display = 'none';
  document.getElementById('view-create').style.display = 'none';
  document.getElementById('view-detail').style.display = 'block';
  renderDetail(family);
}

// ── LIST ──
function renderList() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const filtered = families.filter(f =>
    f.name_fr?.toLowerCase().includes(q) || f.name_ar?.includes(q)
  );
  const el = document.getElementById('family-list');
  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-title">${q ? 'Aucune famille trouvée' : 'Aucune famille encore'}</div>${!q ? '<button class="btn btn-gold" style="width:auto" onclick="showCreate()">Créer la première famille</button>' : ''}</div>`;
    return;
  }
  el.innerHTML = filtered.map(f => `
    <div class="family-card" onclick="showDetail(${JSON.stringify(f).replace(/"/g,'&quot;')})">
      <div class="family-info">
        <div class="family-name-fr">${f.name_fr}</div>
        <div class="family-name-ar">${f.name_ar || ''}</div>
        <div class="family-meta">${(f.videos||'').split(',').filter(Boolean).length} vidéo(s) · ${(f.photos||'').split(',').filter(Boolean).length} photo(s)</div>
      </div>
      <div class="family-actions">
        <button class="delete-btn" onclick="event.stopPropagation();deleteFamily('${f.id}','${f.name_fr}')">Supprimer</button>
      </div>
    </div>`).join('');
}

// ── CREATE ──
function addField(containerId, placeholder) {
  const container = document.getElementById(containerId);
  const row = document.createElement('div');
  row.className = 'field-row';
  row.innerHTML = `<input class="field" placeholder="${placeholder}"/><button class="remove-btn" onclick="this.parentElement.remove()">×</button>`;
  container.appendChild(row);
}

function getFieldValues(containerId) {
  return Array.from(document.querySelectorAll(`#${containerId} input`))
    .map(i => i.value.trim()).filter(Boolean).join(',');
}

function generateSlug(name) {
  const rand = Math.random().toString(36).substring(2, 6);
  return name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '') + '-' + rand;
}

async function saveFamily() {
  const nameFr = document.getElementById('f-name-fr').value.trim();
  if (!nameFr) { toast('Entrez le nom de famille'); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Création…';
  const family = {
    slug: generateSlug(nameFr),
    name_fr: nameFr,
    name_ar: document.getElementById('f-name-ar').value.trim(),
    message: document.getElementById('f-message').value.trim(),
    videos: getFieldValues('video-inputs'),
    photos: getFieldValues('photo-inputs'),
  };
  const result = await api('POST', 'families', family);
  btn.disabled = false; btn.textContent = 'Créer la page famille';
  if (result && result[0]) {
    toast('Page créée ✓');
    showDetail(result[0]);
  } else {
    toast('Erreur — réessayez');
  }
}

async function deleteFamily(id, name) {
  if (!confirm(`Supprimer "${name}" ?`)) return;
  await api('DELETE', `families?id=eq.${id}`);
  toast('Famille supprimée');
  loadFamilies();
}

// ── DETAIL ──
function renderDetail(f) {
  const pageUrl = `${BASE_URL}/famille/${f.slug}`;
  const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(pageUrl)}&bgcolor=ffffff&color=0d0d0d&margin=12`;
  const videos = (f.videos||'').split(',').filter(Boolean);
  const photos = (f.photos||'').split(',').filter(Boolean);

  document.getElementById('detail-content').innerHTML = `
    <div style="text-align:center;margin-bottom:36px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:48px;font-style:italic;margin-bottom:6px">${f.name_fr}</div>
      <div style="font-size:18px;color:var(--gold)">${f.name_ar||''}</div>
    </div>

    <div class="qr-box">
      <div class="qr-corner tl"></div><div class="qr-corner tr"></div>
      <div class="qr-corner bl"></div><div class="qr-corner br"></div>
      <div class="qr-eyebrow">QR Code · à imprimer dans le cadre doré</div>
      <div class="qr-img"><img src="${qrUrl}" width="200" height="200" alt="QR"/></div>
      <div class="qr-scan">Scan Me · امسح الكود</div>
      <div class="qr-url">${pageUrl}</div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="copyUrl('${pageUrl}')">Copier le lien</button>
        <button class="btn btn-gold" onclick="window.open('${pageUrl}','_blank')">Voir la page →</button>
        <button class="btn btn-ghost" onclick="window.open('${qrUrl}','_blank')">Télécharger QR</button>
      </div>
    </div>

    <div class="detail-grid">
      <div class="detail-card">
        <div class="detail-card-label">Vidéos (${videos.length})</div>
        ${videos.length ? videos.map((v,i) => `<div class="detail-item">${i+1}. ${v}</div>`).join('') : '<div style="font-size:12px;color:var(--grey)">Aucune</div>'}
      </div>
      <div class="detail-card">
        <div class="detail-card-label">Photos (${photos.length})</div>
        ${photos.length ? photos.map((p,i) => `<div class="detail-item">${i+1}. ${p}</div>`).join('') : '<div style="font-size:12px;color:var(--grey)">Aucune</div>'}
      </div>
    </div>

    ${f.message ? `<div class="form-box" style="margin-top:2px;text-align:center">
      <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--grey)">"${f.message}"</div>
    </div>` : ''}`;
}

function copyUrl(url) {
  navigator.clipboard.writeText(url).then(() => toast('Lien copié ✓'));
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
